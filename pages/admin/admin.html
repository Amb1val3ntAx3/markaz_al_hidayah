    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../admin.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="no-scroll">


    <nav>
      <label class="logo"><a href="/">Markaz Al Hidayah</a></label>
      <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/tafseer">Tafseer</a></li>
            <li><a href="#">Duruusta</a></li>
            <li><a href="#">Axaadiista</a></li>

        </ul>

    <div class="title">—Enter Password—</div>

        <div class="admin-container">
        <!-- Password Screen -->
        <div class="password-screen" id="passwordScreen">
            <h2>Admin Access</h2>
            <input type="password" id="adminPassword" placeholder="Enter Password">
            <button id="submitPassword">Submit</button>
        </div>

        <!-- Admin Form (Hidden Initially) -->
        <div class="admin-form" id="adminForm">
            <h2>Add New Content</h2>
            <div class="form-group">
                <label for="contentType">Content Type:</label>
                <select id="contentType">
                    <option value="naxwe">Naxwe</option>
                    <option value="tafsir">Tafsir</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nameInput">Name:</label>
                <input type="text" id="nameInput" placeholder="Enter name">
            </div>
            <div class="form-group">
                <label for="audioInput">Audio URL:</label>
                <input type="text" id="audioInput" placeholder="Enter audio URL">
            </div>
            <div class="form-group">
                <label for="imageInput">Image URL:</label>
                <input type="text" id="imageInput" placeholder="Enter image URL">
            </div>
            <button id="submitForm">Submit Content</button>
        </div>


    </div>

    <script src="../../admin.js"></script>





</body>
